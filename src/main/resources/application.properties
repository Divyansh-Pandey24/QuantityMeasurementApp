# =============================================================
# Quantity Measurement Application - Base / Development Configuration
# Default active profile: prod
# To run in dev mode: --spring.profiles.active=dev
# To run tests:       --spring.profiles.active=test
#
# No .env file or spring-dotenv is used. Values are either:
#   - Hardcoded here (dev / non-sensitive defaults)
#   - Overridden by OS environment variables in prod (see application-prod.properties)
# =============================================================

spring.application.name=quantity-measurement-app
spring.profiles.active=dev

# =============================================================
# H2 In-Memory Database (used by the dev and test profiles)
# Overridden by application-prod.properties for MySQL
# =============================================================
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =============================================================
# Spring Data JPA / Hibernate
# =============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================================
# H2 Console
# Access: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:quantitymeasurementdb  |  User: sa  |  Password: (blank)
# =============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# =============================================================
# HikariCP Connection Pool
# =============================================================
spring.datasource.hikari.pool-name=QuantityMeasurementPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================================
# Logging
# =============================================================
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================================
# Swagger / OpenAPI
# =============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# =============================================================
# Spring Boot Actuator
# =============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Quantity Measurement App
info.app.version=17.0
info.app.description=Spring Boot REST API for quantity measurement operations

# =============================================================
# JWT Configuration - development default
# To generate a new secret: openssl rand -base64 32
# =============================================================
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGp3dCBzZWNyZXQga2V5IGZvciBkZXZlbG9wbWVudA==
app.jwt.expiration-ms=86400000

# =============================================================
# GitHub OAuth2 - development credentials
# Obtain from: https://github.com/settings/developers -> OAuth Apps -> New OAuth App
#
# Homepage URL:                 http://localhost:8080
# Authorization callback URL:   http://localhost:8080/login/oauth2/code/github
#
# The user:email scope requests the user's email address.
# GitHub only returns the email if it is not set to private on the account.
# =============================================================
spring.security.oauth2.client.registration.github.client-id=your-github-client-id
spring.security.oauth2.client.registration.github.client-secret=your-github-client-secret
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# =============================================================
# OAuth2 redirect URI
# Where the browser lands after a successful OAuth2 login (any provider).
# For Swagger UI testing: http://localhost:8080/swagger-ui.html
# For a separate frontend SPA: http://localhost:3000/oauth2/callback
# =============================================================
app.oauth2.redirect-uri=http://localhost:8080/swagger-ui.html
